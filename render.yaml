services:
  - type: web
    name: tactile-navigation
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120
    envVars:
      - key: TACTILE_MODEL
        value: best.pt
      - key: OBSTACLE_MODEL
        value: yolov8n.pt
    healthCheckPath: /health
